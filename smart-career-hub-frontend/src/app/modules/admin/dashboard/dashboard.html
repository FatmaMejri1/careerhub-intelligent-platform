<div class="dashboard-layout">
  <app-header></app-header>

  <aside class="sidebar" [class.active]="sidebarActive">
    <div class="sidebar-profile">
      <div class="profile-photo-container">
        <div class="photo-placeholder-icon" *ngIf="!(profileImage$ | async)" routerLink="/admin/profile">
          <i class="fas fa-user-shield"></i>
        </div>
        <img *ngIf="profileImage$ | async as photo" [src]="photo" routerLink="/admin/profile"
          style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; cursor: pointer;">

        <input type="file" #sidebarFileInput (change)="onSidebarFileSelected($event)" accept="image/*" hidden>

        <!-- Camera Icon Badge -->
        <div class="sidebar-photo-badge" (click)="sidebarFileInput.click()" style="cursor: pointer; z-index: 10;"
          title="Changer la photo">
          <i class="fas fa-camera"></i>
        </div>
      </div>
      <h3 class="sidebar-username">{{user?.name || 'Admin'}}</h3>
      <small class="text-xs text-white-50">Administrateur</small>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active" (click)="sidebarActive = false">
        <i class="fas fa-columns"></i>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/admin/profile" routerLinkActive="active" (click)="sidebarActive = false">
        <i class="fas fa-user-circle"></i>
        <span>Mon Profile</span>
      </a>
      <a class="nav-item" routerLink="/admin/users" routerLinkActive="active" (click)="sidebarActive = false">
        <i class="fas fa-users"></i>
        <span>Utilisateurs</span>
      </a>
      <a class="nav-item" routerLink="/admin/offers" routerLinkActive="active" (click)="sidebarActive = false">
        <i class="fas fa-briefcase"></i>
        <span>Offres & Recrutements</span>
      </a>
      <a class="nav-item" routerLink="/admin/fraud" routerLinkActive="active" (click)="sidebarActive = false">
        <i class="fas fa-shield-alt"></i>
        <span>Détection de Fraudes</span>
      </a>



      <!-- Separation for Bottom Items -->
      <div class="mt-auto"></div>

      <a class="nav-item" routerLink="/admin/settings" routerLinkActive="active" (click)="sidebarActive = false">
        <i class="fas fa-cog"></i>
        <span>Paramètres</span>
      </a>

      <a class="nav-item text-danger mt-3" (click)="disconnect()">
        <i class="fas fa-sign-out-alt"></i>
        <span>Déconnexion</span>
      </a>
    </nav>
  </aside>

  <main class="main">
    <button class="mobile-menu-btn" (click)="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <router-outlet></router-outlet>
  </main>
</div>
