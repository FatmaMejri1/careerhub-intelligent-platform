<div class="settings-container fade-in">
    <!-- Header -->
    <header class="page-header mb-5">
        <div>
            <h1 class="fw-bold text-dark">Paramètres du Compte</h1>
            <p class="text-muted">Gérez votre sécurité et vos identifiants d'accès.</p>
        </div>
    </header>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h5 class="fw-bold d-flex align-items-center">
                        <span class="p-2 bg-primary-subtle rounded-3 me-3">
                            <i class="fas fa-key text-primary"></i>
                        </span>
                        Changer le mot de passe
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form (ngSubmit)="updatePassword()">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Mot de passe
                                actuel</label>
                            <input type="password" class="form-control form-control-lg rounded-3"
                                [(ngModel)]="passwords.current" name="current" placeholder="••••••••">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Nouveau mot de
                                passe</label>
                            <input type="password" class="form-control form-control-lg rounded-3"
                                [(ngModel)]="passwords.new" name="new" placeholder="••••••••">
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-muted text-uppercase">Confirmer le nouveau mot
                                de passe</label>
                            <input type="password" class="form-control form-control-lg rounded-3"
                                [(ngModel)]="passwords.confirm" name="confirm" placeholder="••••••••">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm py-3"
                            [disabled]="!passwords.current || !passwords.new || passwords.new !== passwords.confirm">
                            <i class="fas fa-shield-alt me-2"></i> Mettre à jour la sécurité
                        </button>
                    </form>
                </div>
            </div>

            <div class="mt-4 p-3 bg-light rounded-4 border text-center">
                <p class="small text-muted mb-0">
                    <i class="fas fa-info-circle me-1"></i>
                    Pour des raisons de sécurité, vous serez déconnecté après le changement de mot de passe.
                </p>
            </div>
        </div>
    </div>
</div>
