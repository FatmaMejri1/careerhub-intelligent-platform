<div class="profile-layout fade-in">
    <div class="card">
        <div class="card-header">
            <div>
                <h3>Admin Profile</h3>
                <p class="card-subtitle">Manage your administrative account details</p>
            </div>
            <button class="btn-edit" (click)="toggleEdit()" *ngIf="!isEditing">
                <i class="fas fa-pen"></i> Edit Profile
            </button>
        </div>

        <div class="profile-content">
            <!-- Sidebar / Avatar -->
            <div class="profile-sidebar">
                <div class="profile-avatar-container">
                    <div class="avatar-placeholder" *ngIf="!profileImage">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <img *ngIf="profileImage" [src]="profileImage" class="profile-img">
                </div>
                <h4 class="mt-3 fw-bold">Administrator</h4>
                <p class="text-muted">Super Admin</p>

                <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" hidden>
                <button class="btn-upload" (click)="fileInput.click()">
                    <i class="fas fa-camera"></i> Change Photo
                </button>
            </div>

            <!-- Main Info -->
            <div class="profile-main">
                <div class="form-section">
                    <div class="section-title">Personal Information</div>

                    <!-- View Mode -->
                    <div class="grid-2" *ngIf="!isEditing">
                        <div class="form-group">
                            <label class="label">First Name</label>
                            <div class="value-text">{{adminData.firstName}}</div>
                        </div>
                        <div class="form-group">
                            <label class="label">Last Name</label>
                            <div class="value-text">{{adminData.lastName}}</div>
                        </div>
                        <div class="form-group">
                            <label class="label">Email Address</label>
                            <div class="value-text">{{adminData.email}}</div>
                        </div>
                        <div class="form-group">
                            <label class="label">Phone Number</label>
                            <div class="value-text">{{adminData.phone}}</div>
                        </div>
                    </div>

                    <!-- Edit Mode -->
                    <div class="grid-2" *ngIf="isEditing">
                        <div class="form-group">
                            <label class="label">First Name</label>
                            <input type="text" class="form-control" [(ngModel)]="adminData.firstName">
                        </div>
                        <div class="form-group">
                            <label class="label">Last Name</label>
                            <input type="text" class="form-control" [(ngModel)]="adminData.lastName">
                        </div>
                        <div class="form-group">
                            <label class="label">Email Address</label>
                            <input type="email" class="form-control" [(ngModel)]="adminData.email">
                        </div>
                        <div class="form-group">
                            <label class="label">Phone Number</label>
                            <input type="text" class="form-control" [(ngModel)]="adminData.phone">
                        </div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="form-section">
                    <div class="section-title">Security & Role</div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="label">Role</label>
                            <div class="value-text">
                                <span class="badge bg-primary text-white">{{adminData.role}}</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="label">Last Login</label>
                            <div class="value-text">Today, 10:42 AM</div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4" *ngIf="isEditing">
                    <button class="btn btn-light me-2" (click)="toggleEdit()">Cancel</button>
                    <button class="btn btn-primary" (click)="saveProfile()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
</div>
