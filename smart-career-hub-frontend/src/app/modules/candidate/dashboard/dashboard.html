<div class="dashboard-layout">
    <app-header></app-header>

    <aside class="sidebar" [class.active]="sidebarActive">
        <div class="sidebar-profile">
            <div class="profile-photo-container" (click)="fileInput.click()">
                <input #fileInput type="file" (change)="onPhotoSelected($event)" style="display: none" accept="image/*">

                <div class="photo-placeholder-icon" *ngIf="!(userPhoto$ | async)">
                    <i class="fas fa-user"></i>
                </div>

                <img [src]="userPhoto$ | async" alt="Profile" class="profile-photo" *ngIf="userPhoto$ | async">

                <div class="photo-overlay">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <h3 class="sidebar-username">{{ userName }}</h3>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item" routerLink="/candidate/dashboard" routerLinkActive="active"
                (click)="sidebarActive = false">
                <i class="fas fa-columns"></i>
                <span>Dashboard</span>
            </a>
            <a class="nav-item" routerLink="/candidate/my-profile" routerLinkActive="active"
                (click)="sidebarActive = false">
                <i class="fas fa-user"></i>
                <span>Mon Profile</span>
            </a>
            <a class="nav-item" routerLink="/candidate/my-applications" routerLinkActive="active"
                (click)="sidebarActive = false">
                <i class="fas fa-briefcase"></i>
                <span>Mes Candidatures</span>
            </a>
            <a class="nav-item" routerLink="/candidate/cv-manager" routerLinkActive="active"
                (click)="sidebarActive = false">
                <i class="fas fa-file-alt"></i>
                <span>Gestionnaire CV</span>
            </a>
            <a class="nav-item" routerLink="/candidate/trainings" routerLinkActive="active"
                (click)="sidebarActive = false">
                <i class="fas fa-graduation-cap"></i>
                <span>Formations</span>
            </a>

            <!-- Separation for Bottom Items -->
            <div class="mt-auto"></div>

            <a class="nav-item" routerLink="/candidate/settings" routerLinkActive="active"
                (click)="sidebarActive = false">
                <i class="fas fa-cog"></i>
                <span>Paramètres</span>
            </a>



            <a class="nav-item text-danger mt-3" (click)="disconnect()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Disconnect</span>
            </a>
        </nav>
    </aside>

    <main class="main">
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
            <i class="fas fa-bars"></i>
        </button>

        <router-outlet></router-outlet>
    </main>
</div>
