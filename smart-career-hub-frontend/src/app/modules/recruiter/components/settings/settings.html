<div class="fade-in">
    <div class="mb-4">
        <h2 class="fw-bold text-dark">Paramètres</h2>
        <p class="text-muted">Gérez vos préférences et la sécurité de votre compte.</p>
    </div>

    <div class="row g-4">
        <!-- Notifications -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-bell text-primary me-2"></i>Notifications
                    </h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="notifApplications"
                            [(ngModel)]="settings.notifications.applications">
                        <label class="form-check-label" for="notifApplications">
                            Nouvelles candidatures
                            <small class="d-block text-muted">Recevoir une alerte pour chaque candidat.</small>
                        </label>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="notifWeekly"
                            [(ngModel)]="settings.notifications.weeklyReport">
                        <label class="form-check-label" for="notifWeekly">
                            Rapport hebdomadaire
                            <small class="d-block text-muted">Aperçu envoyé chaque lundi matin.</small>
                        </label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="notifMarketing"
                            [(ngModel)]="settings.notifications.marketing">
                        <label class="form-check-label" for="notifMarketing">
                            Nouveautés produit
                            <small class="d-block text-muted">Tenez-vous informé des mises à jour.</small>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preferences -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-sliders-h text-primary me-2"></i>Préférences
                    </h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Langue</label>
                        <select class="form-select" [(ngModel)]="settings.preferences.language">
                            <option value="fr">Français</option>
                            <option value="en">English</option>
                            <option value="ar">العربية</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Fuseau Horaire</label>
                        <select class="form-select" [(ngModel)]="settings.preferences.timezone">
                            <option value="TUN">Tunis (GMT+1)</option>
                            <option value="PAR">Paris (GMT+1)</option>
                            <option value="LON">London (GMT+0)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Security -->
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-lock text-primary me-2"></i>Sécurité
                    </h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <form (submit)="changePassword()">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Mot de passe actuel</label>
                                <input type="password" class="form-control" name="currentPass"
                                    placeholder="e.g. ********" autocomplete="current-password">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Nouveau mot de passe</label>
                                <input type="password" class="form-control" name="newPass"
                                    placeholder="Min 8 caractères" autocomplete="new-password">
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-primary w-100">Changer</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="col-12 text-end">
            <button class="btn btn-outline-secondary me-2">Annuler</button>
            <button class="btn btn-success px-4" (click)="saveSettings()">Enregistrer les modifications</button>
        </div>
    </div>
</div>
