<div class="fade-in">
    <div class="mb-4">
        <h2 class="fw-bold text-dark">Paramètres de sécurité</h2>
        <p class="text-muted">Gérez la sécurité de votre compte en changeant votre mot de passe.</p>
    </div>

    <div class="row g-4">
        <!-- Security -->
        <div class="col-12">
            <div class="card border-0 shadow-sm border-start border-primary border-4">
                <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-lock text-primary me-2"></i>Changer le mot de passe
                    </h5>
                </div>
                <div class="card-body px-4 pb-4">
                    <form (submit)="changePassword()">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Mot de passe actuel</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="fas fa-key text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" name="currentPass"
                                        [(ngModel)]="passwordData.currentPassword"
                                        placeholder="Votre mot de passe actuel" required
                                        autocomplete="current-password">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Nouveau mot de passe</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="fas fa-shield-alt text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" name="newPass"
                                        [(ngModel)]="passwordData.newPassword" placeholder="Min 6 caractères" required
                                        autocomplete="new-password">
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary px-5 py-2 rounded-pill shadow-sm"
                                    [disabled]="isLoading">
                                    <span *ngIf="!isLoading">Mettre à jour le mot de passe</span>
                                    <span *ngIf="isLoading">
                                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                                        Traitement...
                                    </span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Security Advice -->
        <div class="col-12">
            <div class="alert alert-info border-0 shadow-sm d-flex align-items-center rounded-4 scroll-reveal">
                <i class="fas fa-info-circle me-3 fs-4"></i>
                <div>
                    <strong class="d-block">Conseil de sécurité</strong>
                    <span class="small">Utilisez un mélange de lettres, de chiffres et de caractères spéciaux pour un
                        mot de passe robuste. Ne partagez jamais vos identifiants.</span>
                </div>
            </div>
        </div>
    </div>
</div>
