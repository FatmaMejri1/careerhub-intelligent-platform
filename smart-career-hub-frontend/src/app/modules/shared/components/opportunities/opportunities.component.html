<app-header></app-header>
<div class="opportunities-container">
    <div class="hero-section">
        <header class="page-header-modern">
            <div class="badge-pill">
                <i class="bi bi-stars"></i> Nouvelles opportunités chaque jour
            </div>
            <h1>Trouvez votre <span class="highlight-text">emploi de vos rêves</span></h1>
            <p>Explorez les meilleures opportunités de carrière sur le web</p>
        </header>

        <div class="search-wrapper">
            <div class="search-container">
                <i class="bi bi-search search-icon"></i>
                <input type="text" placeholder="Search by job title, company, or location..."
                    class="search-input-modern" (input)="filterJobs($event)">
            </div>
        </div>
    </div>

    <div class="jobs-grid">
        <app-job-card *ngFor="let job of filteredOpportunities" [job]="job" (showDetails)="openJobDetails($event)">
        </app-job-card>
    </div>

    <!-- Centralized Modal -->
    <app-job-details-modal [job]="selectedJob" [isOpen]="isModalOpen" [showApplicationForm]="isApplicationMode"
        (closeModal)="closeModal()" (apply)="onApplyFromModal($event)">
    </app-job-details-modal>

    <!-- Dynamic Quiz Assessment -->
    <app-quiz *ngIf="isQuizOpen && selectedJobForQuiz" [jobTitle]="selectedJobForQuiz.title"
        [jobDescription]="selectedJobForQuiz.description" (quizFinished)="onQuizFinished($event)"
        (closeQuiz)="closeQuiz()">
    </app-quiz>
</div>
