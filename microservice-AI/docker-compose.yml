version: '3.8'

services:
  ai-service:
    build: .
    container_name: smartcareer-ai
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - APP_NAME=Smart Career AI
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./logs:/app/logs
      - ./app/models:/app/models
    depends_on:
      - redis
    networks:
      - smartcareer-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smartcareer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartcareer-network
    command: redis-server --appendonly yes
    restart: unless-stopped

networks:
  smartcareer-network:
    driver: bridge

volumes:
  redis_data:
