# MYSQL CONFIG
spring.datasource.url=jdbc:mysql://localhost:3306/carrerhub?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate will auto-detect MySQL 8.0+ dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Server
server.port=9099

server.tomcat.max-http-post-size=10MB

# JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.data.mongodb.uri=mongodb://localhost:27017/smartcareerhub_fresh
spring.data.mongodb.auto-index-creation=true

# Web Scraping Configuration
scraping.toppportunities.url=https://toppportunities.com

# Disable automatic favicon handling to prevent 500 errors
spring.mvc.favicon.enabled=false

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600
